    function initVisitCounters() {
        let total = localStorage.getItem('hey_total_visits') || 0;
        total = parseInt(total) + 1;
        localStorage.setItem('hey_total_visits', total);

        const todayStr = new Date().toLocaleDateString();
        let storedDate = localStorage.getItem('hey_visit_date');
        let today = localStorage.getItem('hey_today_visits') || 0;

        if (storedDate !== todayStr) {
            today = 1;
            localStorage.setItem('hey_visit_date', todayStr);
        } else {
            today = parseInt(today) + 1;
        }
        localStorage.setItem('hey_today_visits', today);

        document.getElementById('count-total').innerText = total;
        document.getElementById('count-today').innerText = today;
    }

    // --- 연령 그룹 자동 매핑 함수 ---
    function getAgeGroups(ageStr) {
        if (!ageStr) return ['미취학', '초등', '중등이상'];
        let groups = new Set();
        
        // 포괄적 단어
        if (/(전연령|연령제한없음|가족|양육|부모|아빠|성인)/.test(ageStr)) {
            groups.add('미취학'); groups.add('초등'); groups.add('중등이상');
        }
        // 미취학 조건
        if (/(유아|임산부|개월|년생|0세|만3세|만5세|3세|4세|5세|6세|7세|미취학)/.test(ageStr)) {
            groups.add('미취학');
        }
        // 초등 조건
        if (/(초등|초[1-6]|4~13세|5~9세|8세|9세|10세|11세|12세|13세)/.test(ageStr)) {
            groups.add('초등');
        }
        // 중등 이상 조건
        if (/(중등|고등|청소년|14세이상|중[1-3]|고[1-3])/.test(ageStr)) {
            groups.add('중등이상');
        }
        // '이상' 이 들어간 경우에 대한 추가 처리
        if (ageStr.includes('이상')) {
            if (/(초등|8세|13세)/.test(ageStr)) { groups.add('초등'); groups.add('중등이상'); }
            else if (/(개월|세|유아)/.test(ageStr)) { groups.add('미취학'); groups.add('초등'); groups.add('중등이상'); }
        }

        return groups.size > 0 ? Array.from(groups) : ['미취학', '초등', '중등이상'];
    }

    // --- 날짜 포맷팅 함수 (YYYY-MM-DD HH:mm -> M/D(요일) HH:mm) ---
    function formatToShortDate(dateStr) {
        if (!dateStr) return '';
        const match = dateStr.match(/(\d{4})-(\d{2})-(\d{2})(?: (\d{2}:\d{2}))?/);
        if (match) {
            const y = parseInt(match[1], 10);
            const m = parseInt(match[2], 10);
            const d = parseInt(match[3], 10);
            const time = match[4] ? ` ${match[4]}` : '';
            const dateObj = new Date(y, m - 1, d);
            const days = ['일', '월', '화', '수', '목', '금', '토'];
            return `${m}/${d}(${days[dateObj.getDay()]})${time}`;
        }
        return dateStr; // 포맷이 안 맞으면 원본 반환
    }

    // --- 필터 상태 관리 ---
    let currentTab = 'all';

    function changeTab(element, type) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
        currentTab = type;
        applyFilters(); // 탭 변경 시에도 필터 적용 렌더링
    }

    function applyFilters() {
        const filterLoc = document.getElementById('filter-loc').value;
        const filterAge = document.getElementById('filter-age').value;
        const filterCost = document.getElementById('filter-cost').value;

        const container = document.getElementById('list-container');
        container.innerHTML = '';

        const filteredData = eventData.filter(item => {
            // 1. 탭 필터
            const matchTab = currentTab === 'all' || item.type === currentTab;
            // 2. 지역 필터
            const matchLoc = filterLoc === 'all' || (item.loc && item.loc.includes(filterLoc));
            // 3. 연령 필터
            const matchAge = filterAge === 'all' || getAgeGroups(item.age).includes(filterAge);
            // 4. 비용 필터
            let safeCost = item.costType || '정보없음';
            let itemCostGroup = '기타';
            if (safeCost.includes('무료')) itemCostGroup = '무료';
            else if (safeCost.includes('유료')) itemCostGroup = '유료';
            const matchCost = filterCost === 'all' || itemCostGroup === filterCost;

            return matchTab && matchLoc && matchAge && matchCost;
        });

        if (filteredData.length === 0) {
            container.innerHTML = '<div class="empty-state">해당하는 조건의 행사가 없습니다. 😥</div>';
            return;
        }

        filteredData.forEach(item => {
            // 비용 색상 처리
            const safeCost = item.costType || '정보없음';
            let costBadgeClass = 'badge-info';
            if (safeCost.includes('무료')) costBadgeClass = 'badge-free';
            else if (safeCost.includes('유료')) costBadgeClass = 'badge-paid';

            // 내일오픈 / 내일마감 분류
            let tomorrowBadge = '';
            if (item.type === 'tomorrow') {
                if (item.applyOpen && item.applyOpen.includes('03-04')) {
                    tomorrowBadge += `<span class="badge badge-open">내일오픈</span> `;
                }
                if (item.applyClose && item.applyClose.includes('03-04')) {
                    tomorrowBadge += `<span class="badge badge-close">내일마감</span> `;
                }
                // 만약 둘다 아니라면 방어코드
                if (!tomorrowBadge) tomorrowBadge = `<span class="badge badge-open">내일오픈/마감</span> `;
            }
            
            // 날짜 포맷 적용 및 텍스트 조합
            let applyText = '';
            const fOpen = formatToShortDate(item.applyOpen);
            const fClose = formatToShortDate(item.applyClose);

            if (fOpen && fClose) {
                applyText = `${fOpen} ~ ${fClose}`;
            } else if (fOpen) {
                applyText = `${fOpen} 오픈`;
            } else if (fClose) {
                applyText = `<span style="color:#e74c3c;">${fClose} 마감</span>`;
            } else {
                applyText = '별도 공지 및 상시접수';
            }

            if (item.applyNote) {
                applyText += ` <span style="color:#e91e63; font-weight:700; font-size:0.8rem;">[${item.applyNote}]</span>`;
            }

            const cardHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="badges">
                            ${tomorrowBadge}
                            <span class="badge badge-loc">${item.loc || ''}</span>
                            <span class="badge badge-age">${item.age || ''}</span>
                            <span class="badge ${costBadgeClass}">${safeCost}</span>
                        </div>
                    </div>
                    <h2 class="title">${item.title || ''}</h2>
                    <div class="info-row"><div class="info-label">장소/방법</div><div class="info-desc">${item.place || ''}</div></div>
                    <div class="info-row"><div class="info-label">접수기간</div><div class="info-desc">${applyText}</div></div>
                    <div class="info-row"><div class="info-label">운영일정</div><div class="info-desc">${item.date || '정보없음'}</div></div>
                    <a href="${item.link || '#'}" target="_blank" class="btn-link">상세보기 및 예약 ↗</a>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    // --- 웹페이지 로딩 시 초기화 ---
    document.addEventListener('DOMContentLoaded', () => {
        initVisitCounters();
        applyFilters(); // 초기 데이터 렌더링
    });
</script>
