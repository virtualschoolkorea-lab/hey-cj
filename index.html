    function renderCards(filterType) {
        const container = document.getElementById('list-container');
        container.innerHTML = '';

        const filteredData = eventData.filter(item => filterType === 'all' || item.type === filterType);

        filteredData.forEach(item => {
            // 비용 상태 안전 체크
            const safeCostType = item.costType || '정보없음';
            let costBadgeClass = 'badge-info';
            if (safeCostType.includes('무료')) {
                costBadgeClass = 'badge-free';
            } else if (safeCostType.includes('유료')) {
                costBadgeClass = 'badge-paid';
            }

            const tomorrowBadge = item.type === 'tomorrow' ? `<span class="badge badge-tomorrow">내일오픈/마감</span>` : '';
            
            // 접수 기간 텍스트 조합
            let applyText = '';
            if (item.applyOpen && item.applyClose) {
                applyText = `${item.applyOpen} ~ ${item.applyClose}`;
            } else if (item.applyOpen) {
                applyText = `${item.applyOpen} 부터`;
            } else if (item.applyClose) {
                applyText = `<span style="color:#e74c3c;">${item.applyClose} 마감</span>`;
            } else {
                applyText = '별도 공지 및 상시';
            }
            if (item.applyNote) {
                applyText += ` <span style="color:#e91e63; font-weight:700; font-size:0.8rem;">[${item.applyNote}]</span>`;
            }

            const cardHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="badges">
                            ${tomorrowBadge}
                            <span class="badge badge-loc">${item.loc || ''}</span>
                            <span class="badge badge-age">${item.age || ''}</span>
                            <span class="badge ${costBadgeClass}">${safeCostType}</span>
                        </div>
                    </div>
                    <h2 class="title">${item.title || ''}</h2>
                    <div class="info-row"><div class="info-label">장소/방법</div><div class="info-desc">${item.place || ''}</div></div>
                    <div class="info-row"><div class="info-label">접수기간</div><div class="info-desc">${applyText}</div></div>
                    <div class="info-row"><div class="info-label">운영일정</div><div class="info-desc">${item.date || '정보없음'}</div></div>
                    <a href="${item.link || '#'}" target="_blank" class="btn-link">상세보기 및 예약 (블로그) ↗</a>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    // 클릭한 탭의 디자인을 바꾸고 데이터를 필터링하는 함수
    function filterData(element, type) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
        renderCards(type);
    }

    // 웹페이지 로딩이 완료되면 안전하게 첫 화면(전체보기)을 그려줍니다.
    document.addEventListener('DOMContentLoaded', () => {
        renderCards('all');
    });
