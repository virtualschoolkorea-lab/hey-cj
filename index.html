<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헤이청주 - 일정 한눈에 보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --border-color: #e0e0e0;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: var(--bg-color);
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        h1 { margin: 0; font-size: 1.2rem; }
        .sub-header { font-size: 0.8rem; opacity: 0.8; margin-top: 5px; }
        
        /* 탭 메뉴 */
        .tabs {
            display: flex;
            background: white;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 65px;
            z-index: 99;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-sub);
            border-bottom: 3px solid transparent;
        }
        .tab.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
            font-weight: 700;
        }

        /* 리스트 영역 */
        .content { padding: 15px; }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            display: block;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .badges { display: flex; gap: 5px; flex-wrap: wrap; }
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
            color: white;
        }
        .badge-loc { background-color: #3498db; }
        .badge-age { background-color: #9b59b6; }
        .badge-free { background-color: #e74c3c; }
        .badge-paid { background-color: #f39c12; }
        .badge-tomorrow { background-color: #e91e63; }
        
        .title { font-size: 1.05rem; font-weight: 700; margin: 0 0 8px 0; }
        .info-row {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 4px;
            display: flex;
        }
        .info-label { font-weight: 500; width: 60px; flex-shrink: 0; color: #555;}
        
        .btn-link {
            display: block;
            text-align: center;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 12px;
        }
        .btn-link:hover { background-color: #388E3C; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>헤이청주 📢 오픈/마감 일정</h1>
        <div class="sub-header">업데이트: 3/4(수) 21:23</div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="filterData('all')">전체보기</div>
        <div class="tab" onclick="filterData('tomorrow')">내일 오픈/마감</div>
        <div class="tab" onclick="filterData('ongoing')">현재 진행 중</div>
    </div>

    <div class="content" id="list-container">
        </div>
</div>

<script>
    // 제공해주신 데이터를 바탕으로 한 배열 구성
    const eventData = [
        {
            type: "tomorrow",
            loc: "청주", age: "연령제한없음",
            title: "아동전집대출(3-4월)",
            place: "청주 관내 도서관",
            date: "3/13(금)~3/15(일) (대출 45일)",
            costType: "무료",
            link: "https://blog.naver.com/hey_cheongju/224200584218"
        },
        {
            type: "tomorrow",
            loc: "비대면", age: "6-7세(20~21년생)",
            title: "책놀이 옛이야기 (ZOOM)",
            place: "청주열린도서관",
            date: "3/16~4/6 매주 월 (4회차)",
            costType: "무료",
            link: "https://blog.naver.com/hey_cheongju/224204023070"
        },
        {
            type: "tomorrow",
            loc: "청주/주말", age: "어린이포함 가족",
            title: "캘리무드등 만들기 (가족당 2개)",
            place: "내수도서관",
            date: "3/14(토) 10:30-12:00",
            costType: "유료(5천원)",
            link: "https://blog.naver.com/hey_cheongju/224204440261"
        },
        {
            type: "tomorrow",
            loc: "세종/주말", age: "12개월 이상",
            title: "베베핀 뮤지컬",
            place: "세종문화예술회관",
            date: "4/25(토) 11:00 / 14:00 / 16:30",
            costType: "유료",
            link: "https://blog.naver.com/hey_cheongju/224204284270"
        },
        // --- 진행 중 데이터 ---
        {
            type: "ongoing",
            loc: "청주", age: "4~13세",
            title: "찾아가는 직업체험 키자니아",
            place: "현대백화점 충청점",
            date: "3/6(금)~3/29(일) 11:00~18:40",
            costType: "유료(5천원)",
            link: "https://blog.naver.com/hey_cheongju/224197760786"
        },
        {
            type: "ongoing",
            loc: "청주", age: "전연령",
            title: "새활용공예체험 '더새로움'",
            place: "청주새활용시민센터",
            date: "오픈 선착순",
            costType: "무/유료",
            link: "https://m.blog.naver.com/hey_cheongju/224197945325"
        },
        {
            type: "ongoing",
            loc: "청주", age: "2019~2022년생",
            title: "체험형 VR 동화구연",
            place: "오송도서관",
            date: "3/14(토) or 28(토)",
            costType: "무료",
            link: "https://blog.naver.com/hey_cheongju/224200624205"
        },
        {
            type: "ongoing",
            loc: "온라인", age: "초등 4-6학년",
            title: "제19기 어린이법제관 모집",
            place: "어린이법제처",
            date: "3/3 ~ 3/31(화) 18시 선착순",
            costType: "안내없음",
            link: "https://blog.naver.com/hey_cheongju/224202455449"
        }
        // (원하시는 경우 배열에 나머지 데이터도 동일한 형식으로 추가하시면 됩니다!)
    ];

    function renderCards(filterType) {
        const container = document.getElementById('list-container');
        container.innerHTML = '';

        const filteredData = eventData.filter(item => filterType === 'all' || item.type === filterType);

        filteredData.forEach(item => {
            const costBadgeClass = item.costType.includes('무료') ? 'badge-free' : 'badge-paid';
            const tomorrowBadge = item.type === 'tomorrow' ? `<span class="badge badge-tomorrow">내일오픈</span>` : '';
            
            const cardHTML = `
                <div class="card">
                    <div class="card-header">
                        <div class="badges">
                            ${tomorrowBadge}
                            <span class="badge badge-loc">${item.loc}</span>
                            <span class="badge badge-age">${item.age}</span>
                            <span class="badge ${costBadgeClass}">${item.costType}</span>
                        </div>
                    </div>
                    <h2 class="title">${item.title}</h2>
                    <div class="info-row"><div class="info-label">장소/방법</div><div>${item.place}</div></div>
                    <div class="info-row"><div class="info-label">일정/기간</div><div>${item.date}</div></div>
                    <a href="${item.link}" target="_blank" class="btn-link">상세보기 및 예약 (블로그)</a>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    function filterData(type) {
        // 탭 활성화 UI 변경
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        event.target.classList.add('active');
        // 데이터 렌더링
        renderCards(type);
    }

    // 초기 로딩 시 전체보기 렌더링
    renderCards('all');
</script>

</body>
</html>
