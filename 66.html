        const grid = document.getElementById('event-grid');

        events.forEach(event => {
            // 비용 상태 정리
            const costText = event.cost || '정보없음';
            let costColor = 'bg-gray-100 text-gray-600'; 
            if (costText.includes('무료')) {
                costColor = 'bg-emerald-100 text-emerald-800 border border-emerald-200';
            } else if (costText.includes('유료')) {
                costColor = 'bg-rose-100 text-rose-800 border border-rose-200';
            }

            // 신청(접수) 기간 및 노트 정리
            let applyText = '';
            if (event.apply_open && event.apply_close) {
                applyText = `<span class="font-medium">${event.apply_open}</span> ~ <span class="font-medium">${event.apply_close}</span>`;
            } else if (event.apply_open) {
                applyText = `<span class="font-medium text-blue-600">${event.apply_open} 부터</span>`;
            } else if (event.apply_close) {
                applyText = `<span class="font-medium text-red-600">${event.apply_close} 까지</span>`;
            } else {
                applyText = '<span class="text-gray-400 text-sm">별도 공지 및 상시</span>';
            }

            // 신청 노트(선착순 등)가 있으면 뱃지로 추가
            if (event.apply_note) {
                applyText += ` <span class="inline-block mt-1 sm:mt-0 ml-0 sm:ml-1.5 px-2 py-0.5 bg-amber-100 text-amber-800 rounded text-xs font-bold">${event.apply_note}</span>`;
            }

            // 모바일 최적화 카드 HTML 생성
            const card = `
                <div class="event-card bg-white rounded-2xl p-5 md:p-6 border border-gray-200 flex flex-col h-full relative">
                    
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold tracking-wide">${event.loc}</span>
                        <span class="px-3 py-1 ${costColor} rounded-full text-xs font-bold">${costText}</span>
                    </div>
                    
                    <h3 class="text-lg md:text-[19px] font-bold text-gray-900 mb-1.5 leading-snug text-truncate h-14" title="${event.title}">${event.title}</h3>
                    <p class="text-[13px] md:text-sm text-gray-500 mb-4 font-medium flex items-center">
                        <svg class="w-4 h-4 mr-1 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        ${event.place}
                    </p>
                    
                    <div class="bg-slate-50 rounded-xl p-3.5 md:p-4 mb-5 space-y-2.5 flex-grow">
                        <div class="flex items-start text-[13px] md:text-sm">
                            <span class="w-11 font-bold text-slate-700 shrink-0">대상</span>
                            <span class="text-slate-600 break-keep leading-tight">${event.target}</span>
                        </div>
                        <div class="flex items-start text-[13px] md:text-sm">
                            <span class="w-11 font-bold text-slate-700 shrink-0 pt-0.5">접수</span>
                            <span class="text-slate-600 break-keep leading-snug flex-col sm:flex-row">${applyText}</span>
                        </div>
                        <div class="flex items-start text-[13px] md:text-sm pt-1 border-t border-slate-200 mt-2">
                            <span class="w-11 font-bold text-indigo-700 shrink-0 pt-1">일정</span>
                            <span class="text-indigo-900 font-medium break-keep leading-tight pt-1">${event.schedule}</span>
                        </div>
                    </div>
                    
                    <a href="${event.url}" target="_blank" rel="noopener noreferrer" class="block w-full text-center py-3.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-[15px] font-semibold rounded-xl transition-colors duration-200 mt-auto shadow-sm">
                        자세히 보기 🚀
                    </a>
                </div>
            `;
            grid.innerHTML += card;
        });
    </script>
